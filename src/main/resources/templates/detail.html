<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/default_layout">
<th:block layout:fragment="content">

    <div class="article_write_button">

        <button class="button blue" th:onclick="|location.href='@{/article/update/{id}(id=${article.id})}'|">수정하기</button>
        <button class="button red" id="article_delete" >삭제하기</button>

    </div>

    <div class="article">


            <h2 th:text="${article.title}" >
            </h2>


        <h5 th:text="${article.content}"></h5>

    </div>
    <script th:inline="javascript">

        var articleObject = [[${article}]];

        $(document).ready(function(){
         $('#article_delete').click(function(){
         var obj = {


         };

         obj.id = articleObject.id
         obj.title = articleObject.title
         obj.content = articleObject.content
         obj.nickname = '유지누';

        $.ajax({
            　　type:'post'
            　　, contentType:'application/json'
            　　, data: JSON.stringify(obj)
            　　, url: '/article/delete'
            　　, success: function(data) {

            location.href='/article/paging';
            　　　　
            　　}, error:function(e) {
            　　　　
            　　}
            });
      });
});
    </script>



</th:block>
</html>
